
<!DOCTYPE html>
<html>
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:var(--font-sans,system-ui,sans-serif)}
#vn{display:flex;flex-direction:column;height:580px;background:var(--color-background-secondary,#f5f5f3);border-radius:12px;overflow:hidden}
#scene{width:100%;height:190px;position:relative;overflow:hidden;transition:background 0.7s}
.s-lab{background:linear-gradient(180deg,#b5d4f4 0%,#e6f1fb 55%,#c0dd97 100%)}
.s-win{background:linear-gradient(180deg,#9fe1cb 0%,#e1f5ee 55%,#c0dd97 100%)}
.s-err{background:linear-gradient(180deg,#f7c1c1 0%,#fcebeb 55%,#f5c4b3 100%)}
.deco{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#chars{display:flex;align-items:flex-end;justify-content:center;height:100%;gap:44px;padding:0 20px;position:relative;z-index:2}
.ch{display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.4s;transform-origin:bottom}
.ch.dim{opacity:0.22;transform:scale(0.9)}
.ch.active{transform:scale(1.06)}
.ch-head{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid rgba(255,255,255,0.55);position:relative;z-index:2}
.ch-body{width:54px;height:64px;border-radius:27px 27px 10px 10px;margin-top:-10px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
.ch-shirt{width:30px;height:14px;border-radius:4px 4px 0 0}
.ch-lbl{font-size:10px;font-weight:500;color:var(--color-text-secondary,#888);letter-spacing:.05em;text-transform:uppercase}
.pip{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;opacity:0;transition:opacity .3s}
.ch.active .pip{opacity:1;animation:bpip .9s ease-in-out infinite}
@keyframes bpip{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.4)}}
#dbox{background:var(--color-background-primary,#fff);border-top:.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));flex:1;display:flex;flex-direction:column;padding:14px 18px;gap:9px;overflow:hidden;min-height:0}
#sprow{display:flex;align-items:center;gap:8px}
#spbadge{font-size:11px;font-weight:500;padding:3px 11px;border-radius:20px;letter-spacing:.04em;transition:background .3s,color .3s}
.ba{background:var(--color-background-info,#e6f1fb);color:var(--color-text-info,#185fa5)}
.bm{background:var(--color-background-success,#eaf3de);color:var(--color-text-success,#3b6d11)}
#sc{margin-left:auto;font-size:12px;color:var(--color-text-secondary,#888)}
#scn{font-weight:500;color:var(--color-text-primary,#111)}
#dlg{font-size:13.5px;color:var(--color-text-primary,#111);line-height:1.72;min-height:40px;flex-shrink:0}
#cur{display:inline-block;width:2px;height:13px;background:var(--color-text-secondary,#888);margin-left:1px;vertical-align:middle;animation:bc .8s steps(1) infinite}
@keyframes bc{0%,100%{opacity:1}50%{opacity:0}}
#diagwrap{flex-shrink:0;display:none}
#codewrap{background:var(--color-background-secondary,#f5f5f3);border-radius:8px;border:.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));overflow:hidden;display:none;flex-shrink:0}
#codehdr{padding:5px 12px;border-bottom:.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));font-size:11px;color:var(--color-text-secondary,#888);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
#codebody{padding:9px 14px;font-family:var(--font-mono,monospace);font-size:11.5px;line-height:1.65;overflow-x:auto;white-space:pre}
#choices{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.cbtn{background:var(--color-background-secondary,#f5f5f3);border:.5px solid var(--color-border-secondary,rgba(0,0,0,.2));border-radius:8px;padding:8px 13px;font-size:12.5px;color:var(--color-text-primary,#111);cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:8px}
.cbtn:hover:not(:disabled){background:var(--color-background-tertiary,#eee);transform:translateX(2px)}
.cbtn.wr{border-color:var(--color-border-danger,#e24b4a);background:var(--color-background-danger,#fcebeb);color:var(--color-text-danger,#a32d2d)}
.cbtn.ok{border-color:var(--color-border-success,#639922);background:var(--color-background-success,#eaf3de);color:var(--color-text-success,#3b6d11)}
#nxt{align-self:flex-end;background:transparent;border:.5px solid var(--color-border-secondary,rgba(0,0,0,.2));border-radius:20px;padding:6px 16px;font-size:12px;color:var(--color-text-primary,#111);cursor:pointer;display:none;transition:all .15s;flex-shrink:0}
#nxt:hover{background:var(--color-background-secondary,#f5f5f3)}
#prog{height:3px;background:var(--color-background-tertiary,#ddd);flex-shrink:0}
#pf{height:100%;background:#378ADD;transition:width .5s ease;border-radius:0 2px 2px 0}
.kw{color:#B5507A}.fn{color:#378ADD}.num{color:#63992A}.cm{color:#888780;font-style:italic}.ty{color:#185FA5}
svg text{font-family:var(--font-sans,system-ui,sans-serif)}
</style>

/* ── ENGINE ───────────────────────────────────────────────────── */
let cur=0,score=0,typing=null,done=false;

const pf=document.getElementById('pf');
const scEl=document.getElementById('scene');
const to=document.getElementById('to');
const curEl=document.getElementById('cur');
const diagwrap=document.getElementById('diagwrap');
const codewrap=document.getElementById('codewrap');
const codebody=document.getElementById('codebody');
const choices=document.getElementById('choices');
const nxt=document.getElementById('nxt');
const spbadge=document.getElementById('spbadge');
const scnEl=document.getElementById('scn');
const caEl=document.getElementById('ca');
const cmEl=document.getElementById('cm2');
const ahEl=document.getElementById('ah');
const mhEl=document.getElementById('mh');

function stopT(){if(typing){clearInterval(typing);typing=null}}

function typeText(txt,cb){
  stopT();to.textContent='';done=false;
  curEl.style.display='inline-block';
  let i=0;
  typing=setInterval(()=>{
    to.textContent=txt.slice(0,++i);
    if(i>=txt.length){stopT();done=true;curEl.style.display='none';if(cb)cb();}
  },20);
}

function hlCode(tokens){
  const map={ty:'#185FA5',fn:'#378ADD',kw:'#B5507A',num:'#63992A',cm:'#888780',x:null};
  return tokens.map(t=>{
    const col=map[t.t];
    const style=col?`style="color:${col}${t.t==='cm'?';font-style:italic':''}"`:'' ;
    return col?`<span ${style}>${esc(t.v)}</span>`:esc(t.v);
  }).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(idx){
  const s=scenes[idx];
  pf.style.width=Math.round((idx/(scenes.length-1))*100)+'%';
  scEl.className='scene '+(s.bg==='lab'?'s-lab':s.bg==='win'?'s-win':'s-err');

  caEl.className='ch'+(s.fo==='alex'?' active':' dim');
  cmEl.className='ch'+(s.fo==='mentor'?' active':' dim');
  if(s.af)ahEl.innerHTML='<span class="pip" style="background:#378ADD"></span>'+aF[s.af];
  if(s.mf)mhEl.innerHTML='<span class="pip" style="background:#3B6D11"></span>'+mF[s.mf];

  spbadge.textContent=s.sp;
  spbadge.className=s.sp==='Alex'?'ba':'bm';

  diagwrap.style.display='none';
  diagwrap.innerHTML='';
  if(s.diag){diagwrap.style.display='block';diagwrap.innerHTML=diagrams[s.diag];}

  codewrap.style.display='none';
  if(s.code){codewrap.style.display='block';codebody.innerHTML=hlCode(s.code);}

  choices.innerHTML='';nxt.style.display='none';

  typeText(s.text,()=>{
    if(s.choices){
      s.choices.forEach(c=>{
        const btn=document.createElement('button');
        btn.className='cbtn';
        btn.innerHTML=`<span style="font-size:14px">${c.icon||'›'}</span>${c.text}`;
        btn.onclick=()=>{
          Array.from(choices.children).forEach(b=>{b.disabled=true;b.style.opacity='.45'});
          if(c.correct===false){btn.classList.add('wr');btn.style.opacity='1';}
          else if(c.correct===true){btn.classList.add('ok');btn.style.opacity='1';score++;scnEl.textContent=score;}
          if(c.fb){
            typeText(c.fb,()=>setTimeout(()=>{cur=c.next;render(cur)},700));
            spbadge.textContent='Mentor';spbadge.className='bm';
          } else {setTimeout(()=>{cur=c.next;render(cur)},500);}
        };
        choices.appendChild(btn);
      });
    } else if(s.end){
      const d=document.createElement('div');
      d.style.cssText='display:flex;flex-direction:column;gap:6px;align-items:flex-start';
      d.innerHTML=`<div style="font-size:13px;color:var(--color-text-success);font-weight:500">Tutorial complete — score: ${score}/3</div>`;
      const rb=document.createElement('button');
      rb.className='cbtn ok';rb.innerHTML='↺ Play again';
      rb.onclick=()=>{cur=0;score=0;scnEl.textContent=0;render(0)};
      d.appendChild(rb);choices.appendChild(d);
    } else {nxt.style.display='block';}
  });

  nxt.onclick=()=>{
    if(!done){stopT();to.textContent=s.text;curEl.style.display='none';done=true;nxt.style.display='block';return;}
    if(s.next!==undefined){cur=s.next;render(cur);}
  };
}
render(0);
</script>
